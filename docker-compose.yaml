version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: guess_game_db
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=guess_db
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - game_net

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d guess_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. BACKEND (FLASK)
  backend:
    build: 
      context: .
      dockerfile: Dockerfile
    image: guess_backend:v1
    restart: always
    environment:
      - DB_TYPE=postgres
      - DB_NAME=guess_db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_HOST=db
    depends_on:
      db:
        condition: service_healthy
    networks:
      - game_net
    deploy:
      replicas: 3

  frontend:
    build: 
      context: ./frontend
      args:
        - REACT_APP_BACKEND_URL=http://localhost:5000
      dockerfile: Dockerfile
    image: guess_frontend:v1
    container_name: guess_game_nginx
    restart: always
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - game_net

volumes:
  db_data:

networks:
  game_net:
    driver: bridge